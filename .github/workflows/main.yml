name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'

      - name: Build APK
        run: gradle assembleRelease assembleDebug --no-daemon

      - name: Find APK files
        run: |
          echo "Looking for APK files..."
          find . -name "*.apk" -type f
          
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-assistant-release
          path: |
            **/app-release.apk
            **/app-release-unsigned.apk
          if-no-files-found: warn
          
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-assistant-debug
          path: |
            **/app-debug.apk
          if-no-files-found: warn
